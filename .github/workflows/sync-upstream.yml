name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * *'   # todos los dias a las 06:00 UTC (03:00 Argentina)
  workflow_dispatch:        # ejecutable a mano desde Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Agregar upstream y hacer merge
        run: |
          git remote add upstream https://github.com/anthropics/claude-for-legal.git
          git fetch upstream main
          git merge upstream/main --no-edit --allow-unrelated-histories \
            -X ours \
            || echo "Conflictos detectados - revision manual requerida"

      - name: Push si hay cambios
        run: |
          git diff --quiet HEAD origin/main || git push origin main
